document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"2da66e87-cffe-4e91-9c3b-1eb851a70034\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>\n@font-face{font-family:\"Commissioner\";font-weight:400;font-display:swap;src:url(\"61cb4641-9353-4448-ae59-e07655a41623\") format(\"truetype\");}\n@font-face{font-family:\"Commissioner\";font-weight:500;font-display:swap;src:url(\"d80fb158-3182-4de2-bb1a-d19f015d529d\") format(\"truetype\");}\n@font-face{font-family:\"Commissioner\";font-weight:600;font-display:swap;src:url(\"8135b575-f68d-4f0f-8159-006e3e3a3efb\") format(\"truetype\");}\n@font-face{font-family:\"Commissioner\";font-weight:700;font-display:swap;src:url(\"60812f4d-98e1-4998-8845-ec7e3692f2a7\") format(\"truetype\");}\n@font-face{font-family:\"Minion Pro\";font-weight:500;font-display:swap;src:url(\"b24b22c9-aac3-407e-80fa-b53a05ef100e\") format(\"truetype\");}\n*{box-sizing:border-box;}\nhtml,body{margin:0;padding:0;}\n::-webkit-scrollbar{width:10px;height:10px;}\n::-webkit-scrollbar-thumb{background:#C4C4C4;border:3px solid transparent;background-clip:padding-box;border-radius:6px;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-width:100%; width:max-content; min-height:100vh; box-sizing:border-box; padding:56px; background:#E4E3DF; font-family:'Commissioner',system-ui,sans-serif; color:#161616;\">\n\n  <div style=\"max-width:1360px;\">\n    <div style=\"font-family:'Commissioner'; font-weight:600; font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:#6B6B6B;\">Disrupt Collective — Internal Tools<\u002Fdiv>\n    <h1 style=\"font-family:'Minion Pro',serif; font-weight:500; font-size:52px; line-height:0.98; letter-spacing:-0.02em; margin:10px 0 0;\">DC Hub — wireframes.<\u002Fh1>\n    <p style=\"font-family:'Commissioner'; font-weight:400; font-size:16px; line-height:1.5; color:#343434; max-width:720px; margin:14px 0 0;\">Low-fidelity structure for the unified DAM pipeline tool. One coherent app — Pipeline, Vocabulary, Generator and Settings under a single navigation model. Grayscale by intent: the Disrupt Collective system is monochrome, so structure is drawn with hairlines, not color. Annotations below tie each layout decision to the five problems in the brief.<\u002Fp>\n\n    <div style=\"display:flex; gap:10px; flex-wrap:wrap; margin-top:22px;\">\n      <sc-for list=\"{{ legend }}\" as=\"item\" hint-placeholder-count=\"5\">\n        <div style=\"display:flex; align-items:center; gap:8px; border:1px solid #161616; background:#fff; border-radius:2px; padding:6px 11px;\">\n          <span style=\"display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:999px; background:#161616; color:#fff; font-size:11px; font-weight:700;\">{{ item.n }}<\u002Fspan>\n          <span style=\"font-size:12.5px; font-weight:500; color:#242424;\">{{ item.t }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ SECTION: NAV EXPLORATION ============ -->\n  <div style=\"margin-top:52px;\">\n    <div style=\"font-family:'Commissioner'; font-weight:600; font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:#6B6B6B; margin-bottom:4px;\">A — Navigation model · three options<\u002Fdiv>\n    <div style=\"font-size:14px; color:#6B6B6B; max-width:760px; margin-bottom:20px;\">How you move between the four areas. Problem 3 asks for one nav model that also lets Pipeline keep its own configuration panel.<\u002Fdiv>\n    <div style=\"display:flex; gap:32px; align-items:flex-start;\">\n      <sc-for list=\"{{ navOptions }}\" as=\"opt\" hint-placeholder-count=\"3\">\n        <div style=\"flex:none; width:392px;\">\n          <div style=\"display:flex; align-items:baseline; gap:10px; margin-bottom:10px;\">\n            <span style=\"font-family:'Minion Pro',serif; font-size:20px;\">{{ opt.title }}<\u002Fspan>\n            <span style=\"font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:{{ opt.tagColor }};\">{{ opt.tag }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"background:#fff; border:1px solid #161616; border-radius:2px; box-shadow:0 1px 3px rgba(0,0,0,.08); height:240px; overflow:hidden;\">\n            <div style=\"height:22px; background:#F4F4F2; border-bottom:1px solid #E2E2E2; display:flex; align-items:center; gap:5px; padding:0 9px;\">\n              <span style=\"width:8px;height:8px;border-radius:999px;border:1px solid #C4C4C4;\"><\u002Fspan>\n              <span style=\"width:8px;height:8px;border-radius:999px;border:1px solid #C4C4C4;\"><\u002Fspan>\n              <span style=\"width:8px;height:8px;border-radius:999px;border:1px solid #C4C4C4;\"><\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:0; height:218px;\">{{ opt.sketch }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:13px; line-height:1.45; color:#343434; margin-top:12px;\">{{ opt.note }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ SECTION: THE UNIFIED APP ============ -->\n  <div style=\"margin-top:56px;\">\n    <div style=\"font-family:'Commissioner'; font-weight:600; font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:#6B6B6B; margin-bottom:4px;\">B — The unified app · resolved direction (Option 1)<\u002Fdiv>\n    <div style=\"font-size:14px; color:#6B6B6B; max-width:760px; margin-bottom:20px;\">A working low-fi shell. Click the left rail to switch areas; expand the config groups, subtype tables and Issues panel. Shown in a macOS window.<\u002Fdiv>\n\n    <div style=\"position:relative; width:1360px; background:#fff; border:1px solid #161616; border-radius:8px; box-shadow:0 24px 64px rgba(0,0,0,.16); overflow:hidden;\">\n      <!-- mac chrome -->\n      <div style=\"height:40px; background:#ECECEC; border-bottom:1px solid #D8D8D8; display:flex; align-items:center; padding:0 16px; gap:8px; position:relative;\">\n        <span style=\"width:12px;height:12px;border-radius:999px;background:#fff;border:1px solid #C4C4C4;\"><\u002Fspan>\n        <span style=\"width:12px;height:12px;border-radius:999px;background:#fff;border:1px solid #C4C4C4;\"><\u002Fspan>\n        <span style=\"width:12px;height:12px;border-radius:999px;background:#fff;border:1px solid #C4C4C4;\"><\u002Fspan>\n        <div style=\"position:absolute; left:0; right:0; text-align:center; font-size:13px; font-weight:600; color:#6B6B6B; pointer-events:none;\">DC Hub<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; height:824px;\">\n        <!-- GLOBAL NAV RAIL -->\n        <nav style=\"flex:none; width:84px; background:#161616; display:flex; flex-direction:column; align-items:center; padding:18px 0; gap:6px;\">\n          <div style=\"width:34px; height:34px; border:2px solid #fff; border-radius:30% / 40%; margin-bottom:18px;\"><\u002Fdiv>\n          <sc-for list=\"{{ nav }}\" as=\"item\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ item.go }}\" style=\"{{ item.style }}\">\n              <span style=\"width:22px; height:22px; display:flex; align-items:center; justify-content:center;\">{{ item.icon }}<\u002Fspan>\n              <span style=\"font-size:9.5px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase;\">{{ item.label }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n          <div style=\"flex:1;\"><\u002Fdiv>\n          <div style=\"width:30px; height:30px; border-radius:999px; background:#343434;\"><\u002Fdiv>\n        <\u002Fnav>\n\n        <!-- SCREEN AREA -->\n        <div style=\"flex:1; min-width:0; display:flex; flex-direction:column; background:#fff;\">\n          <sc-if value=\"{{ isPipeline }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"display:flex; height:100%; min-height:0;\">\n\n  <!-- CONFIG SIDEBAR (secondary) -->\n  <aside style=\"flex:none; width:316px; border-right:1px solid #E2E2E2; display:flex; flex-direction:column; min-height:0; background:#FAFAF9;\">\n    <div style=\"padding:16px 18px 12px; border-bottom:1px solid #E2E2E2;\">\n      <div style=\"font-family:'Minion Pro',serif; font-size:21px;\">Pipeline<\u002Fdiv>\n      <div style=\"font-size:12px; color:#6B6B6B; margin-top:2px;\">Configure once, run repeatedly.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- accordion (scrolls) -->\n    <div style=\"flex:1; min-height:0; overflow-y:auto;\">\n\n      <!-- PATHS -->\n      <div style=\"border-bottom:1px solid #E2E2E2;\">\n        <button onclick=\"{{ toggleSec.paths }}\" style=\"width:100%; display:flex; align-items:center; gap:8px; padding:13px 18px; border:none; background:transparent; cursor:pointer; font-family:inherit;\">\n          <span style=\"color:#161616;\">{{ secCaret.paths }}<\u002Fspan>\n          <span style=\"font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:#161616;\">Paths<\u002Fspan>\n          <span style=\"margin-left:auto; font-size:11px; color:#969696;\">4 set<\u002Fspan>\n        <\u002Fbutton>\n        <sc-if value=\"{{ sec.paths }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"padding:0 18px 16px; display:flex; flex-direction:column; gap:12px;\">\n          <div>\n            <div style=\"font-size:10.5px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#6B6B6B; margin-bottom:5px;\">Source folder<\u002Fdiv>\n            <div style=\"display:flex; gap:7px;\">\n              <div style=\"flex:1; min-width:0; border:1px solid #C4C4C4; border-radius:2px; padding:7px 9px; font-family:ui-monospace,Menlo,monospace; font-size:11.5px; color:#343434; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">…/CloudStorage/Dropbox/ESS<\u002Fdiv>\n              <button style=\"flex:none; border:1px solid #161616; background:#fff; border-radius:2px; padding:0 11px; font-family:inherit; font-size:12px; font-weight:600; cursor:pointer;\">Browse<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:10.5px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#6B6B6B; margin-bottom:5px;\">Target folder<\u002Fdiv>\n            <div style=\"display:flex; gap:7px;\">\n              <div style=\"flex:1; min-width:0; border:1px solid #C4C4C4; border-radius:2px; padding:7px 9px; font-family:ui-monospace,Menlo,monospace; font-size:11.5px; color:#343434; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">…/OneDrive-SharedLibrary/OUT<\u002Fdiv>\n              <button style=\"flex:none; border:1px solid #161616; background:#fff; border-radius:2px; padding:0 11px; font-family:inherit; font-size:12px; font-weight:600; cursor:pointer;\">Browse<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:10.5px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#6B6B6B; margin-bottom:5px;\">OneDrive flat folder<\u002Fdiv>\n            <div style=\"display:flex; gap:7px;\">\n              <div style=\"flex:1; min-width:0; border:1px solid #C4C4C4; border-radius:2px; padding:7px 9px; font-family:ui-monospace,Menlo,monospace; font-size:11.5px; color:#343434; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">…/CloudStorage/OneDrive/Flat<\u002Fdiv>\n              <button style=\"flex:none; border:1px solid #161616; background:#fff; border-radius:2px; padding:0 11px; font-family:inherit; font-size:12px; font-weight:600; cursor:pointer;\">Browse<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:10.5px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#6B6B6B; margin-bottom:5px;\">Obsidian vault<\u002Fdiv>\n            <div style=\"display:flex; gap:7px;\">\n              <div style=\"flex:1; min-width:0; border:1px solid #C4C4C4; border-radius:2px; padding:7px 9px; font-family:ui-monospace,Menlo,monospace; font-size:11.5px; color:#343434; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">…/Sites/localhost/ESS-DAM<\u002Fdiv>\n              <button style=\"flex:none; border:1px solid #161616; background:#fff; border-radius:2px; padding:0 11px; font-family:inherit; font-size:12px; font-weight:600; cursor:pointer;\">Browse<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- CONNECTIONS -->\n      <div style=\"border-bottom:1px solid #E2E2E2;\">\n        <button onclick=\"{{ toggleSec.conns }}\" style=\"width:100%; display:flex; align-items:center; gap:8px; padding:13px 18px; border:none; background:transparent; cursor:pointer; font-family:inherit;\">\n          <span style=\"color:#161616;\">{{ secCaret.conns }}<\u002Fspan>\n          <span style=\"font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:#161616;\">Connections<\u002Fspan>\n          <span style=\"margin-left:auto; font-size:11px; color:#6B6B6B;\">2 connected<\u002Fspan>\n        <\u002Fbutton>\n        <sc-if value=\"{{ sec.conns }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:0 18px 16px; display:flex; flex-direction:column; gap:10px;\">\n          <div style=\"display:flex; align-items:center; gap:9px;\">\n            <span style=\"width:7px; height:7px; border-radius:999px; background:#161616;\"><\u002Fspan>\n            <span style=\"font-size:13px; font-weight:600;\">Dropbox<\u002Fspan>\n            <span style=\"font-size:11px; color:#6B6B6B;\">connected · auto-refresh<\u002Fspan>\n            <button style=\"margin-left:auto; border:1px solid #C4C4C4; background:#fff; border-radius:2px; padding:5px 11px; font-family:inherit; font-size:12px; cursor:pointer;\">Reconnect<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:9px;\">\n            <span style=\"width:7px; height:7px; border-radius:999px; background:#161616;\"><\u002Fspan>\n            <span style=\"font-size:13px; font-weight:600;\">OneDrive<\u002Fspan>\n            <span style=\"font-size:11px; color:#6B6B6B;\">connected<\u002Fspan>\n            <button style=\"margin-left:auto; border:1px solid #C4C4C4; background:#fff; border-radius:2px; padding:5px 11px; font-family:inherit; font-size:12px; cursor:pointer;\">Reconnect<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- TASKS -->\n      <div style=\"border-bottom:1px solid #E2E2E2;\">\n        <button onclick=\"{{ toggleSec.tasks }}\" style=\"width:100%; display:flex; align-items:center; gap:8px; padding:13px 18px; border:none; background:transparent; cursor:pointer; font-family:inherit;\">\n          <span style=\"color:#161616;\">{{ secCaret.tasks }}<\u002Fspan>\n          <span style=\"font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:#161616;\">Tasks<\u002Fspan>\n          <span style=\"margin-left:auto; font-size:11px; color:#969696;\">4 of 4 · in order<\u002Fspan>\n        <\u002Fbutton>\n        <sc-if value=\"{{ sec.tasks }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"padding:0 18px 16px; display:flex; flex-direction:column; gap:2px;\">\n          <div style=\"display:flex; align-items:center; gap:10px; padding:7px 0;\">\n            <span style=\"width:17px; height:17px; border-radius:3px; background:#161616; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px;\">✓<\u002Fspan>\n            <span style=\"font-size:13.5px;\">1 · Generate thumbnails<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px; padding:7px 0;\">\n            <span style=\"width:17px; height:17px; border-radius:3px; background:#161616; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px;\">✓<\u002Fspan>\n            <span style=\"font-size:13.5px;\">2 · Distribute packages<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px; padding:7px 0;\">\n            <span style=\"width:17px; height:17px; border-radius:3px; background:#161616; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px;\">✓<\u002Fspan>\n            <span style=\"font-size:13.5px;\">3 · Publish on cloud<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px; padding:7px 0 7px 28px;\">\n            <span style=\"width:16px; height:16px; border-radius:3px; border:1px solid #C4C4C4; background:#fff;\"><\u002Fspan>\n            <span style=\"font-size:12.5px; color:#6B6B6B;\">↳ Flat export to OneDrive<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px; padding:7px 0;\">\n            <span style=\"width:17px; height:17px; border-radius:3px; background:#161616; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px;\">✓<\u002Fspan>\n            <span style=\"font-size:13.5px;\">4 · Publish to DAM<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- OPTIONS -->\n      <div style=\"border-bottom:1px solid #E2E2E2;\">\n        <button onclick=\"{{ toggleSec.opts }}\" style=\"width:100%; display:flex; align-items:center; gap:8px; padding:13px 18px; border:none; background:transparent; cursor:pointer; font-family:inherit;\">\n          <span style=\"color:#161616;\">{{ secCaret.opts }}<\u002Fspan>\n          <span style=\"font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:#161616;\">Run options<\u002Fspan>\n          <span style=\"margin-left:auto; font-size:11px; color:#969696;\">2 on<\u002Fspan>\n        <\u002Fbutton>\n        <sc-if value=\"{{ sec.opts :0%; background:#161616;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <button style=\"width:100%; border:none; background:#161616; color:#fff; border-radius:3px; padding:13px; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:9px;\">▶ Run<\u002Fbutton>\n      <div style=\"display:flex; gap:9px; margin-top:9px;\">\n        <button style=\"flex:1; border:1px solid #C4C4C4; background:#fff; color:#969696; border-radius:3px; padding:9px; font-family:inherit; font-size:13px; font-weight:600; cursor:not-allowed;\">■ Stop<\u002Fbutton>\n        <button style=\"flex:1; border:1px solid #161616; background:#fff; border-radius:3px; padding:9px; font-family:inherit; font-size:12.5px; font-weight:600; cursor:pointer;\">Update OneDrive links<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div data-annotation=\"\" style=\"position:absolute;\"><\u002Fdiv>\n  <\u002Faside>\n\n  <!-- MAIN: stats + log + issues -->\n  <div style=\"flex:1; min-width:0; display:flex; flex-direction:column; min-height:0;\">\n\n    <!-- STATS STRIP -->\n    <div style=\"flex:none; border-bottom:1px solid #E2E2E2; padding:14px 22px;\">\n      <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:11px;\">\n        <span style=\"font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:#6B6B6B;\">Last run · completed with issues · 2m 14s ago<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(8,1fr); gap:10px;\">\n        <sc-for list=\"{{ stats }}\" as=\"st\" hint-placeholder-count=\"8\">\n          <div style=\"border:1px solid #E2E2E2; border-radius:2px; padding:9px 11px;\">\n            <div style=\"font-family:'Minion Pro',serif; font-size:24px; line-height:1; color:{{ st.color }};\">{{ st.v }}<\u002Fdiv>\n            <div style=\"font-size:10px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; ">\n            <sc-for list=\"{{ obsidian }}\" as=\"o\" hint-placeholder-count=\"2\">\n              <span style=\"font-family:ui-monospace,Menlo,monospace; font-size:11.5px; border:1px solid #C4C4C4; border-radius:999px; padding:3px 10px; color:#343434; background:#fff;\">{{ o }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ hasSel }}\" hint-placeholder-val=\"{{ false }}\"><\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"flex:none; border-top:1px solid #E2E2E2; padding:14px 20px;\">\n        <button onclick=\"{{ clearGen }}\" style=\"width:100%; border:1px solid #C4C4C4; background:#fff; border-radius:3px; padding:10px; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer;\">Clear all<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n          <sc-if value=\"{{ isSettings }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"display:flex; flex-direction:column; height:100%; min-height:0;\">\n  <div style=\"flex:none; padding:22px 26px 18px; border-bottom:1px solid #E2E2E2; display:flex; align-items:flex-end; justify-content:space-between;\">\n    <div>\n      <h2 style=\"font-family:'Minion Pro',serif; font-size:34px; margin:0;\">Settings<\u002Fh2>\n      <div style=\"font-size:14px; color:#6B6B6B; margin-top:4px;\">In-app — no longer a detached modal. Changes apply on save.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:9px;\">\n      <button style=\"border:1px solid #C4C4C4; background:#fff; border-radius:3px; padding:10px 18px; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer;\">Cancel<\u002Fbutton>\n      <button style=\"border:none; background:#161616; color:#fff; border-radius:3px; padding:10px 20px; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer;\">Save<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"flex:1; min-height:0; overflow-y:auto; padding:26px; display:grid; grid-template-columns:1fr 1fr; gap:26px; align-content:start;\">\n\n    <!-- FOLDER PATTERNS -->\n    <div style=\"border:1px solid #E2E2E2; border-radius:3px;\">\n      <div style=\"padding:14px 18px; border-bottom:1px solid #E2E2E2; font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:#6B6B6B;\">Folder patterns<\u002Fdiv>\n      <div style=\"padding:18px; display:flex; flex-direction:column; gap:16px;\">\n        <div>\n          <div style=\"font-size:11px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:#6B6B6B; margin-bottom:7px;\">Filter mode<\u002Fdiv>\n          <div style=\"display:inline-flex; border:1px solid #161616; border-radius:3px; overflow:hidden;\">\n            <span style=\"padding:7px 16px; background:#161616; color:#fff; font-size:12.5px; font-weight:600;\">blacklist<\u002Fspan>\n            <span style=\"padding:7px 16px; background:#fff; color:#343434; font-size:12.5px; font-weight:600;\">whitelist<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-for list=\"{{ patFields }}\" as=\"f\" hint-placeholder-count=\"6\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between; gap:14px;\">\n            <span style=\"font-size:13px;\">{{ f.label }}<\u002Fspan>\n            <span style=\"flex:none; width:130px; border:1px solid #C4C4C4; border-radius:2px; padding:7px 10px; font-family:ui-monospace,Menlo,monospace; font-size:12.5px; text-align:right; background:#fff;\">{{ f.val }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- THUMBNAILS + DAM -->\n    <div style=\"display:flex; flex-direction:column; gap:26px;\">\n      <div style=\"border:1px solid #E2E2E2; border-radius:3px;\">\n        <div style=\"padding:14px 18px; border-bottom:1px solid #E2E2E2; font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:#6B6B6B;\">Thumbnails &amp; DAM<\u002Fdiv>\n        <div style=\"padding:18px; display:flex; flex-direction:column; gap:16px;\">\n          <sc-for list=\"{{ thumbFields }}\" as=\"f\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex; align-items:center; justify-content:space-between; gap:14px;\">\n              <span style=\"font-size:13px;\">{{ f.label }}<\u002Fspan>\n              <span style=\"flex:none; width:90px; border:1px solid #C4C4C4; border-radius:2px; padding:7px 10px; font-family:ui-monospace,Menlo,monospace; font-size:12.5px; text-align:right; background:#fff;\">{{ f.val }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- CREDENTIALS -->\n      <div style=\"border:1px solid #E2E2E2; border-radius:3px;\">\n        <div style=\"padding:14px 18px; border-bottom:1px solid #E2E2E2; font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:#6B6B6B;\">Cloud credentials <span style=\"color:#969696; font-weight:500; letter-spacing:0;\">· optional<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:18px; display:flex; flex-direction:column; gap:16px;\">\n          <sc-for list=\"{{ credFields }}\" as=\"f\" hint-placeholder-count=\"4\">\n            <div>\n              <div style=\"font-size:11px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:#6B6B6B; margin-bottom:6px;\">{{ f.label }}<\u002Fdiv>\n              <div style=\"border:1px solid #C4C4C4; border-radius:2px; padding:7px 10px; font-family:ui-monospace,Menlo,monospace; font-size:12px; color:#969696; background:#fff;\">{{ f.val }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute; inset:0; background:rgba(22,22,22,0.32); display:flex; align-items:center; justify-content:center; z-index:1000;\">\n        <div style=\"width:580px; max-width:92%; background:#fff; border:2px solid #161616; border-radius:4px; box-shadow:6px 6px 0 #161616;\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid #E2E2E2;\">\n            <div style=\"font-family:'Minion Pro',serif; font-size:22px;\">Add {{ modalDimLabel }} tag<\u002Fdiv>\n            <button onclick=\"{{ closeModal }}\" style=\"border:none; background:transparent; font-size:22px; color:#6B6B6B; cursor:pointer; line-height:1;\">×<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"padding:22px; display:flex; flex-direction:column; gap:18px;\">\n            <div>\n              <div style=\"font-size:11px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:#6B6B6B; margin-bottom:8px;\">Subtype <span style=\"color:#969696; font-weight:500; letter-spacing:0;\">· sets the prefix<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; flex-wrap:wrap; gap:8px;\">\n                <sc-for list=\"{{ modalSubtypes }}\" as=\"st\" hint-placeholder-count=\"5\">\n                  <button onclick=\"{{ st.set }}\" style=\"{{ st.style }}\">\n                    <span style=\"font-size:12.5px; font-weight:600;\">{{ st.label }}<\u002Fspan>\n                    <span style=\"font-family:ui-monospace,Menlo,monospace; font-size:11px; opacity:0.7;\">{{ st.prefixTag }}<\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-size:11px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:#6B6B6B; margin-bottom:8px;\">Shortcode<\u002Fdiv>\n              <div style=\"display:flex; align-items:stretch; border:1px solid #161616; border-radius:3px; overflow:hidden;\">\n                <sc-if value=\"{{ modalHasPrefix }}\" hint-placeholder-val=\"{{ true }}\">\n                  <span style=\"display:flex; align-items:center; padding:0 12px; background:#161616; color:#fff; font-family:ui-monospace,Menlo,monospace; font-size:14px; font-weight:600;\">{{ modalPrefix }}<\u002Fspan>\n                <\u002Fsc-if>\n                <input value=\"{{ modalCode }}\" oninput=\"{{ onModalCode }}\" placeholder=\"Sln\" style=\"flex:1; border:none; outline:none; padding:11px 12px; font-family:ui-monospace,Menlo,monospace; font-size:14px; color:#161616;\">\n              <\u002Fdiv>\n              <div style=\"font-size:11.5px; color:#6B6B6B; margin-top:7px;\">{{ modalHint }}<\u002Fdiv>\n              <div style=\"font-size:12px; color:#343434; margin-top:9px;\">Result · <span style=\"font-family:ui-monospace,Menlo,monospace; font-weight:600;\">{{ modalFull }}<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:grid; grid-template-columns:1fr 100px; gap:14px;\">\n              <div>\n                <div style=\"font-size:11px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:#6B6B6B; margin-bottom:8px;\">Label<\u002Fdiv>\n                <div style=\"border:1px solid #C4C4C4; border-radius:2px; padding:10px 11px; font-size:13px; color:#969696;\">Human-readable name<\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <div style=\"font-size:11px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:#6B6B6B; margin-bottom:8px;\">Icon<\u002Fdiv>\n                <div style=\"border:1px dashed #C4C4C4; border-radius:2px; padding:10px 11px; font-size:13px; color:#969696; text-align:center;\">opt.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-size:11px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:#6B6B6B; margin-bottom:8px;\">Obsidian tags<\u002Fdiv>\n              <div style=\"border:1px solid #C4C4C4; border-radius:2px; padding:10px 11px; font-size:13px; color:#969696;\">e.g. banner print<\u002Fdiv>\n              <div style=\"font-size:11.5px; color:#6B6B6B; margin-top:7px;\">Space-separated. First = most specific. “banner print” → #banner + #print.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; justify-content:flex-end; gap:10px; padding:16px 22px; border-top:1px solid #E2E2E2;\">\n            <button onclick=\"{{ closeModal }}\" style=\"border:1px solid #C4C4C4; background:#fff; border-radius:3px; padding:10px 18px; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer;\">Cancel<\u002Fbutton>\n            <button onclick=\"{{ closeModal }}\" style=\"border:none; background:#161616; color:#fff; border-radius:3px; padding:10px 22px; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer;\">Save<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1480,&quot;height&quot;:960}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'pipeline',\n    sec: { paths: true, conns: false, tasks: true, opts: false },\n    issuesOpen: { skip: true, disconnected: true, version: false, error: false },\n    vocabDim: 'entity',\n    collapsed: {},\n    modalOpen: false,\n    modalEditing: false,\n    modalDim: 'entity',\n    modalSubtype: 'product',\n    modalCode: '',\n    sel: {},\n    desc: 'Sealing overview',\n    vMaj: 1, vMin: 2, vPat: 0,\n  };\n\n  PREFIX = { company: '', product: 'p-', customer: 'c-', partner: 'x-', event: 'e-' };\n\n  VOCAB = {\n    entity: {\n      label: 'Entity', q: 'Who or what is this about?',\n      subtypes: [\n        { key: 'company', label: 'Company', tags: [ { c: 'ESS', l: 'ESS', o: 'ess' } ] },\n        { key: 'product', label: 'Product', tags: [ { c: 'p-Rns', l: 'Rinsing', o: 'rinsing' }, { c: 'p-Sln', l: 'Sealing', o: 'sealing' }, { c: 'p-Wax', l: 'Waxing', o: 'waxing' }, { c: 'p-Cld', l: 'Cloud', o: 'cloud' } ] },\n        { key: 'customer', label: 'Customer', tags: [ { c: 'c-BMW', l: 'BMW', o: 'bmw' }, { c: 'c-VW', l: 'Volkswagen', o: 'volkswagen' } ] },\n        { key: 'partner', label: 'Partner', tags: [ { c: 'x-AuF', l: 'AuFinity', o: 'aufinity' } ] },\n        { key: 'event', label: 'Event', tags: [ { c: 'e-PEX', l: 'PaintExpo', o: 'paintexpo' } ] },\n      ],\n    },\n    angle: {\n      label: 'Angle', q: 'What is the purpose?',\n      subtypes: [\n        { key: 'sales-mktg', label: 'Sales / Mktg', tags: [ { c: 'Sal', l: 'Sales', o: 'sales' }, { c: 'Acc', l: 'Account-based', o: 'account-based' } ] },\n        { key: 'content', label: 'Content', tags: [ { c: 'Tst', l: 'Testimonial', o: 'testimonial' }, { c: 'Cas', l: 'Case study', o: 'case-study' } ] },\n        { key: 'context', label: 'Context', tags: [ { c: 'Ovw', l: 'Overview', o: 'overview' }, { c: 'Tec', l: 'Technical', o: 'technical' } ] },\n      ],\n    },\n    format: {\n      label: 'Format', q: 'What kind of file is it?',\n      subtypes: [\n        { key: 'document', label: 'Document', tags: [ { c: 'Doc', l: 'Document', o: 'document' }, { c: 'Pre', l: 'Presentation', o: 'presentation' } ] },\n        { key: 'media', label: 'Media', tags: [ { c: 'Vid', l: 'Video', o: 'video' } ] },\n        { key: 'image-var', label: 'Image variant', tags: [ { c: 'Ban', l: 'Banner', o: 'banner' } ] },\n      ],\n    },\n  };\n\n  go(s) { this.setState({ screen: s }); }\n  toggleSec(k) { this.setState(st => ({ sec: { ...st.sec, [k]: !st.sec[k] } })); }\n  toggleIssue(k) { this.setState(st => ({ issuesOpen: { ...st.issuesOpen, [k]: !st.issuesOpen[k] } })); }\n  toggleGroup(k) { this.setState(st => ({ collapsed: { ...st.collapsed, [k]: !st.collapsed[k] } })); }\n  setDim(d) { this.setState({ vocabDim: d }); }\n  toggleSel(key) { this.setState(st => ({ sel: { ...st.se
