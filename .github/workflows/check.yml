name: Check

on:
  pull_request:
  push:
    branches: [main, staging, dev]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - run: npm run setup
      - run: npm run check
      - run: npm test
        working-directory: desktop
